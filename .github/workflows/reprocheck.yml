name: Reprocheck pipeline
run-name: reprocheck ${{ inputs.app_id }}

concurrency:
  group: reprocheck-${{ inputs.app_id }}-${{ inputs.build_pipeline_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Application ID'
        required: true
      git_ref:
        description: 'Git reference (unused, for backwards compatibility)'
        required: true
      build_pipeline_id:
        description: 'Build pipeline ID'
        required: true
      callback_url:
        description: 'Callback URL'
        required: true
      callback_token:
        description: 'Callback token'
        required: true
      build_type:
        description: 'Build type'
        required: true
        default: 'default'
      spot:
        description: 'Use spot instances'
        required: false
        default: 'true'
      pr_target_branch:
        description: 'Target branch for PR builds (unused)'
        required: false
        default: 'master'

jobs:
  update-log-url:
    runs-on: ubuntu-latest
    steps:
      - name: Report log URL to the backend
        run: |
          CALLBACK_TOKEN="$(jq -r '.inputs.callback_token' $GITHUB_EVENT_PATH)"
          echo "::add-mask::$CALLBACK_TOKEN"

          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CALLBACK_TOKEN" \
            -d '{"log_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "${{ inputs.callback_url }}/log_url"

  setup-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.runner }}
      timeout: ${{ steps.set-runner.outputs.timeout }}
    steps:
      - id: set-runner
        run: |
          if [[ "${{ inputs.build_type }}" == "default" ]]; then
            echo "runner=ubuntu-24.04" >> $GITHUB_OUTPUT
            echo "timeout=360" >> $GITHUB_OUTPUT
          else
            echo "runner=runs-on=${{ github.run_id }}-${{ github.run_attempt }}/runner=medium-amd64/tag=arch-amd64/retry=false/spot=false" >> $GITHUB_OUTPUT
            echo "timeout=240" >> $GITHUB_OUTPUT
          fi

  reprocheck:
    needs: [update-log-url, setup-runner]
    runs-on: ${{ needs.setup-runner.outputs.runner }}
    timeout-minutes: ${{ fromJSON(needs.setup-runner.outputs.timeout) }}
    steps:
      - name: Disable AppArmor
        run: |
          sudo aa-teardown >/dev/null 2>&1 || true
          sudo systemctl disable --now apparmor.service >/dev/null 2>&1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Setup work directory
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/reproworkdir
          mkdir -p ${GITHUB_WORKSPACE}/reproworkdir/tmp
          mkdir -p ${GITHUB_WORKSPACE}/reproworkdir/.local/share
          chmod -R 777 ${GITHUB_WORKSPACE}/reproworkdir

      - name: Download seccomp profile
        run: |
          curl -s https://raw.githubusercontent.com/openpak/vorarbeiter/refs/heads/main/flatpak.seccomp.json -o flatpak.seccomp.json

      - name: Run reprocheck
        continue-on-error: true
        id: reprocheck
        env:
          AWS_DEFAULT_REGION: ${{ secrets.REPRO_AWS_DEFAULT_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.REPRO_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.REPRO_AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME: ${{ secrets.REPRO_AWS_S3_BUCKET_NAME }}
        run: |
          docker run --rm \
            --entrypoint="" \
            --security-opt seccomp=./flatpak.seccomp.json \
            --security-opt apparmor=unconfined \
            --cap-drop all \
            -v /proc:/host/proc \
            -v "${GITHUB_WORKSPACE}/reproworkdir:/reproworkdir" \
            -e TMPDIR=/reproworkdir/tmp \
            -e XDG_DATA_HOME=/reproworkdir/.local/share \
            -e GITHUB_SERVER_URL \
            -e GITHUB_REPOSITORY \
            -e GITHUB_RUN_ID \
            -e AWS_DEFAULT_REGION \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_S3_BUCKET_NAME \
            -w /reproworkdir \
            ghcr.io/flathub-infra/flatpak-builder-lint:unprivileged \
            flathub-repro-checker --json --upload-result --appid "${{ inputs.app_id }}" | tee reprocheck-output.json

      - name: Save reprocheck output
        if: always()
        run: |
          if [ -f reprocheck-output.json ]; then
            cp reprocheck-output.json /tmp/reprocheck-result.json
          else
            echo '{"status_code": "1", "message": "Reprocheck failed to run", "appid": "${{ inputs.app_id }}", "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%S.%6N%:z")'"}' > /tmp/reprocheck-result.json
          fi

      - name: Report job status
        if: always()
        run: |
          CALLBACK_TOKEN="$(jq -r '.inputs.callback_token' $GITHUB_EVENT_PATH)"
          echo "::add-mask::$CALLBACK_TOKEN"

          if [[ "${{ job.status }}" == "cancelled" ]]; then
            status="cancelled"
            status_code="1"
            timestamp="$(date -u +\"%Y-%m-%dT%H:%M:%S.%6N%:z\")"
            message="Job cancelled"
            result_url=""
          elif [ -f /tmp/reprocheck-result.json ]; then
            reprocheck_data=$(cat /tmp/reprocheck-result.json)
            status_code=$(echo "$reprocheck_data" | jq -r '.status_code // "1"')
            timestamp=$(echo "$reprocheck_data" | jq -r '.timestamp // ""')
            message=$(echo "$reprocheck_data" | jq -r '.message // ""')
            result_url=$(echo "$reprocheck_data" | jq -r '.result_url // ""')

            if [[ "$status_code" == "0" ]]; then
              status="success"
            else
              status="failure"
            fi
          else
            status="failure"
            status_code="1"
            timestamp="$(date -u +\"%Y-%m-%dT%H:%M:%S.%6N%:z\")"
            message="Reprocheck output not available"
            result_url=""
          fi

          payload=$(jq -n \
            --arg status "$status" \
            --arg build_pipeline_id "${{ inputs.build_pipeline_id }}" \
            --arg status_code "$status_code" \
            --arg timestamp "$timestamp" \
            --arg appid "${{ inputs.app_id }}" \
            --arg result_url "$result_url" \
            --arg message "$message" \
            '{
              status: $status,
              build_pipeline_id: $build_pipeline_id,
              status_code: $status_code,
              timestamp: $timestamp,
              appid: $appid,
              result_url: $result_url,
              message: $message
            }')

          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CALLBACK_TOKEN" \
            -d "$payload" \
            "${{ inputs.callback_url }}/reprocheck"

      - name: Dump reprocheck log
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          LOG_FILE="${GITHUB_WORKSPACE}/reproworkdir/.local/share/flathub_repro_checker/reprocheck.log"
          cat "$LOG_FILE" || true
